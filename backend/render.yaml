databases:
  - name: sitewatch-db
    plan: free
    databaseName: sitewatch
    user: sitewatch

services:
  - type: web
    name: sitewatch-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium --with-deps
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: sitewatch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sitewatch-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"

  - type: redis
    name: sitewatch-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
